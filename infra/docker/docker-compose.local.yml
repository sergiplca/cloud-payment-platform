name: cloud-payment-platform

services:

  api-gateway:
    build:
      context: ../../services/api-gateway
    container_name: api-gateway
    env_file:
      - .services_env
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks:
      - cloud-payment-platform-edge
      - cloud-payment-platform-backend

  order-service:
    build:
      context: ../../services/order-service
    container_name: order-service
    env_file:
      - .services_env
    restart: unless-stopped
    networks:
      - cloud-payment-platform-backend

  payment-service:
    build:
      context: ../../services/payment-service
    container_name: payment-service
    env_file:
      - .services_env
    restart: unless-stopped
    networks:
      - cloud-payment-platform-backend

  notification-service:
    build:
      context: ../../services/notification-service
    container_name: notification-service
    env_file:
      - .services_env
    restart: unless-stopped
    networks:
      - cloud-payment-platform-backend

networks:
  cloud-payment-platform-edge:
    driver: bridge

  cloud-payment-platform-backend:
    driver: bridge
    internal: true