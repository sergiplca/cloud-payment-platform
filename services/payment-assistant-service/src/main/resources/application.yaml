server:
  port: 8084

spring:
  application:
    name: payment-assistant-service

  datasource:
    url: jdbc:postgresql://localhost:5432/cloud-payment-platform
    username: ${POSTGRES_USER:cloud-payment-platform}
    password: ${POSTGRES_PASSWORD:changeIt}
    driver-class-name: org.postgresql.Driver

  kafka:
    consumer:
      group-id: payment-assistant-service
      auto-offset-reset: earliest

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        default_schema: paymentassistantservice
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    default_schema: paymentassistantservice

  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        model: llama3.2:3b
      embedding:
        model: nomic-embed-text

feign:
  llm:
    url: http://localhost:11434
  client:
    connectTimeout: 5000
    readTimeout: 5000
    loggerLevel: full

app:
  kafka:
    payment-topic: payments.payment.completed

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level [%X{correlationId}] %logger{36} - %msg%n"
