spring:
  datasource:
    url: jdbc:${POSTGRES_URL}/cloud-payment-platform
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}

  security:
    oauth2:
      resourceserver:
        jwt:
          secret-key: ${TOKEN_SECRET}

  kafka:
    bootstrap-servers: kafka:9092

  ai:
    ollama:
      base-url: http://ollama:11434
      chat:
        model: llama3.2:3b
      embedding:
        model: nomic-embed-text

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics"
  endpoint:
    health:
      show-details: always
    metrics:
      enabled: true
    info:
      enabled: true

feign:
  llm:
    url: http://ollama:11434

app:
  token:
    secret: ${TOKEN_SECRET}

info:
  app:
    name: payment-assistant-service
    description: RAG powered interface for payments
    version: 1.0.0