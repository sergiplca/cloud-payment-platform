server:
  port: 8080

spring:
  application:
    name: api-gateway

  security:
    oauth2:
      resourceserver:
        jwt:
          secret-key: super-secret-which-no-one-should-ever-know

  datasource:
    url: jdbc:postgresql://localhost:5432/cloud-payment-platform
    username: ${POSTGRES_USER:cloud-payment-platform}
    password: ${POSTGRES_PASSWORD:changeIt}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        default_schema: apigateway
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    default_schema: apigateway

app:
  token:
    expiration: 60000
    secret: super-secret-which-no-one-should-ever-know

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics, gateway"
  endpoint:
    health:
      show-details: always
    metrics:
      enabled: true
    info:
      enabled: true
    gateway:
      enabled: true
      access: read-only
