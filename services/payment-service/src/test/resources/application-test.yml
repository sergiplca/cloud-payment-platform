spring:
  application:
    name: payment-service

  kafka:
    bootstrap-servers: kafka:9092

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        default_schema: paymentservice
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

    flyway:
      enabled: true
      locations: classpath:db/migration
      baseline-on-migrate: true
      validate-on-migrate: true
      default_schema: paymentservice

app:
  outbox:
    fixed-delay: 2000
    page-size: 512
    default-sort-column: creationTimestamp